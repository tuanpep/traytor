name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@traytor'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  vscode-publish:
    name: Publish to VS Code Marketplace
    runs-on: ubuntu-latest
    needs: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install main dependencies
        run: pnpm install --frozen-lockfile

      - name: Install extension dependencies
        working-directory: extension
        run: pnpm install --frozen-lockfile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        working-directory: extension
        run: vsce package --out ../traytor.vsix

      - name: Publish to VS Code Marketplace
        working-directory: extension
        run: vsce publish --pat ${{ secrets.VSCE_PAT }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [npm-publish, vscode-publish]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm build

      - name: Build extension VSIX
        working-directory: extension
        run: |
          pnpm install --frozen-lockfile
          npm install -g @vscode/vsce
          vsce package --out ../traytor.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            traytor-*.tgz
            traytor.vsix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
